name: Build 360T7 (W25N01KV + 108M)

on:
  workflow_dispatch:
    inputs:
      clean:
        description: 'Clean ccache'
        default: 'true'

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  CONFIG_FILE: .config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 400

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Clean and prepare disk
      run: |
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache
        sudo docker rmi $(docker images -q) 2>/dev/null || true
        sudo apt clean
        df -hT

    - name: Install dependencies (Ubuntu 24.04 compatible)
      run: |
        sudo add-apt-repository -y universe
        sudo apt update
        sudo apt install -y \
          build-essential clang flex g++ gawk gcc-multilib gettext git \
          libncurses5-dev libssl-dev python3 python3-dev rsync unzip \
          zlib1g-dev file wget time
        sudo apt install -y npm
        sudo npm install -g uglify-js
        sudo apt clean

    - name: Clone source code
      run: git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Update feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Copy custom config
      run: |
        [ -e $GITHUB_WORKSPACE/$CONFIG_FILE ] && cp $GITHUB_WORKSPACE/$CONFIG_FILE openwrt/.config
        cd openwrt
        echo "CONFIG_DEVEL=y" >> .config
        echo "CONFIG_CCACHE=y" >> .config
        echo "CONFIG_MTD_SPI_NAND_W25N01KV=y" >> .config
        echo "CONFIG_TARGET_LAYOUT_108M=y" >> .config

    - name: Download packages
      working-directory: ./openwrt
      run: |
        make defconfig
        make download -j8

    - name: Compile firmware (single thread)
      working-directory: ./openwrt
      id: compile
      run: |
        make -j1 V=s 2>&1 | tee build.log
        echo "status=$?" >> $GITHUB_OUTPUT

    - name: Show error tail if failed
      if: steps.compile.outputs.status != 0
      working-directory: ./openwrt
      run: |
        echo "==================== Last 100 lines of build.log ===================="
        tail -n 100 build.log
        echo "====================================================================="
        exit 1

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: 360T7-firmware
        path: openwrt/bin/targets/mediatek/mt7981/*-factory.bin
